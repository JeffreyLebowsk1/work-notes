<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Work Notes{% endblock %}</title>
    <link rel="stylesheet" href="{{ static_asset_url('css/style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="{{ url_for('index') }}" class="nav-brand">
                📋 Work Notes
            </a>
            <div class="nav-links">
                <a href="{{ url_for('index') }}">Home</a>
                <a href="{{ url_for('section', section_key='graduation') }}">🎓 Graduation</a>
                <a href="{{ url_for('section', section_key='meetings') }}">📅 Meetings</a>
                <a href="{{ url_for('section', section_key='daily-logs') }}">📓 Daily Logs</a>
                <a href="{{ url_for('section', section_key='transcripts') }}">📄 Transcripts</a>
                <a href="{{ url_for('search') }}" class="btn-search">🔍 Search</a>
                <a href="{{ url_for('assistant') }}" class="btn-ai">🤖 AI Assistant</a>
            </div>
        </div>
    </nav>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="footer-container">
            <p>Work Notes — Registrar's Office, Central Carolina Community College</p>
            <p>Browse, search, and manage your work notes 📋</p>
        </div>
    </footer>

    <script src="{{ static_asset_url('js/main.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
