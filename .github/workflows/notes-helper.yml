name: Notes Helper

on:
  workflow_dispatch:
    inputs:
      command:
        description: "Command to run"
        required: true
        type: choice
        options:
          - analyze
          - sort
          - organize
          - search
          - import
          - process-inbox
      file:
        description: "File path for 'analyze' (relative to repo root, leave blank for all) or 'import' (path to the file to import)"
        required: false
        default: ""
      keyword:
        description: "Keyword or phrase for 'search'"
        required: false
        default: ""
      folder:
        description: "Limit 'sort' or 'search' to a top-level folder (e.g. graduation, meetings)"
        required: false
        default: ""
      sort_by:
        description: "Sort criterion for 'sort' (name, date, size)"
        required: false
        type: choice
        default: name
        options:
          - name
          - date
          - size
      context:
        description: "Context lines around each match for 'search' (default: 2)"
        required: false
        default: "2"
      output:
        description: "Output file path for 'organize' (e.g. tools/index.md — leave blank to print)"
        required: false
        default: ""
      import_dest:
        description: "Destination for 'import' — folder or full path relative to repo root (leave blank to auto-detect)"
        required: false
        default: ""
      import_dry_run:
        description: "Dry-run for 'import' — show what would happen without copying files (true/false)"
        required: false
        default: "false"
      import_organize:
        description: "Refresh tools/index.md after a successful 'import' (true/false)"
        required: false
        default: "false"

jobs:
  run-helper:
    name: Run notes_helper.py ${{ inputs.command }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Build command arguments
        id: build_args
        shell: bash
        run: |
          CMD="${{ inputs.command }}"
          ARGS=""

          if [[ "$CMD" == "analyze" && -n "${{ inputs.file }}" ]]; then
            ARGS="${{ inputs.file }}"
          fi

          if [[ "$CMD" == "sort" ]]; then
            ARGS="--by ${{ inputs.sort_by }}"
            if [[ -n "${{ inputs.folder }}" ]]; then
              ARGS="$ARGS --folder ${{ inputs.folder }}"
            fi
          fi

          if [[ "$CMD" == "organize" && -n "${{ inputs.output }}" ]]; then
            ARGS="--output ${{ inputs.output }}"
          fi

          if [[ "$CMD" == "search" ]]; then
            if [[ -z "${{ inputs.keyword }}" ]]; then
              echo "::error::A keyword is required for the 'search' command."
              exit 1
            fi
            ARGS="${{ inputs.keyword }} --context ${{ inputs.context }}"
            if [[ -n "${{ inputs.folder }}" ]]; then
              ARGS="$ARGS --folder ${{ inputs.folder }}"
            fi
          fi

          if [[ "$CMD" == "import" ]]; then
            if [[ -z "${{ inputs.file }}" ]]; then
              echo "::error::A file path is required for the 'import' command."
              exit 1
            fi
            ARGS="${{ inputs.file }}"
            if [[ -n "${{ inputs.import_dest }}" ]]; then
              ARGS="$ARGS --dest ${{ inputs.import_dest }}"
            fi
            if [[ "${{ inputs.import_dry_run }}" == "true" ]]; then
              ARGS="$ARGS --dry-run"
            fi
            if [[ "${{ inputs.import_organize }}" == "true" ]]; then
              ARGS="$ARGS --organize"
            fi
          fi

          if [[ "$CMD" == "process-inbox" ]]; then
            if [[ "${{ inputs.import_dry_run }}" == "true" ]]; then
              ARGS="$ARGS --dry-run"
            fi
            if [[ "${{ inputs.import_organize }}" == "true" ]]; then
              ARGS="$ARGS --organize"
            fi
          fi

          echo "args=$ARGS" >> "$GITHUB_OUTPUT"

      - name: Run notes_helper.py
        run: |
          python3 tools/notes_helper.py ${{ inputs.command }} ${{ steps.build_args.outputs.args }}

      - name: Commit generated files (organize with output, import, or process-inbox)
        if: |
          (inputs.command == 'organize' && inputs.output != '') ||
          (inputs.command == 'import' && inputs.import_dry_run != 'true') ||
          (inputs.command == 'process-inbox' && inputs.import_dry_run != 'true')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            if [[ "${{ inputs.command }}" == "import" ]]; then
              git commit -m "chore: import note via Notes Helper workflow"
            elif [[ "${{ inputs.command }}" == "process-inbox" ]]; then
              git commit -m "chore: process inbox via Notes Helper workflow"
            else
              git commit -m "chore: refresh notes index via Notes Helper workflow"
            fi
            git push
          fi

