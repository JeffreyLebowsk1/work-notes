# render.yaml — Render.com deployment configuration
# Docs: https://render.com/docs/blueprint-spec
#
# How to deploy:
#   1. Push this repo to GitHub (private repo recommended — notes are internal)
#   2. Go to https://dashboard.render.com → New → Blueprint
#   3. Connect your GitHub repo — Render reads this file automatically
#   4. Set APP_USERNAME and APP_PASSWORD in the Render environment variables
#   5. Deploy — the app auto-redeploys every time you push notes to GitHub

services:
  - type: web
    name: cccc-notes
    runtime: python
    buildCommand: pip install -r tools/requirements-web.txt
    startCommand: gunicorn --chdir tools app:app
    # Render free tier auto-assigns a PORT env var; the app reads it via config.py
    envVars:
      - key: SECRET_KEY
        generateValue: true      # Render generates a random secret automatically
      - key: APP_USERNAME
        sync: false              # Set this in the Render dashboard (keep private)
      - key: APP_PASSWORD
        sync: false              # Set this in the Render dashboard (keep private)
      - key: AI_PROVIDER
        value: gemini
      - key: GEMINI_API_KEY
        sync: false              # Optional — set in Render dashboard to enable AI
