<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Advisor Lookup</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <div class="popup-header">
      <span class="popup-icon">🔍</span>
      <span class="popup-title">Advisor Lookup</span>
    </div>
    <form id="advisor-form">
      <div class="form-row">
        <input type="text" id="program" name="program" placeholder="Program" autocomplete="off">
        <input type="text" id="campus" name="campus" placeholder="Campus" autocomplete="off">
      </div>
      <div class="form-row">
        <input type="text" id="last-name" name="last_name" placeholder="Student Last Name" required autocomplete="off">
      </div>
      <button type="submit" class="btn-primary">Search</button>
    </form>
    <div id="result-card" class="result-card" style="display:none;"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
